version: '3.8'

services:
  # Nginx 反向代理 + 前端静态文件
  nginx:
    image: nginx:alpine
    container_name: meeting-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../web:/usr/share/nginx/html:ro
    depends_on:
      - server
    networks:
      - meeting-net
    restart: unless-stopped

  # Go 信令服务器
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: meeting-server
    environment:
      - DATABASE_URL=postgres://meeting:meeting123@postgres:5432/meeting?sslmode=disable
      - SFU_URL=http://sfu:3000
      - JWT_SECRET=your-secret-key-change-in-production
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
    depends_on:
      - postgres
    networks:
      - meeting-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # mediasoup SFU 服务
  sfu:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.sfu
    container_name: meeting-sfu
    ports:
      - "3000:3000"
      - "40000-40100:40000-40100/udp"
    environment:
      - MEDIASOUP_ANNOUNCED_IP=${SFU_IP:-}
    networks:
      - meeting-net
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: meeting-db
    environment:
      - POSTGRES_PASSWORD=meeting123
      - POSTGRES_DB=meeting
      - POSTGRES_USER=meeting
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - meeting-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting -d meeting"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  meeting-net:
    driver: bridge

volumes:
  postgres-data:
