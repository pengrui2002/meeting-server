<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空中会议 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            padding: 28px 30px;
            text-align: center;
            color: white;
        }
        .login-header .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 10px;
            border-radius: 50%;
            object-fit: contain;
            background: white;
            padding: 3px;
        }
        .login-header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 3px;
        }
        .login-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .login-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }
        .login-tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .login-tab.active {
            color: #07c160;
            border-bottom-color: #07c160;
        }

        .login-content {
            padding: 20px 28px 24px;
        }

        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .form-input {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus {
            border-color: #07c160;
        }
        .form-btn {
            width: 100%;
            padding: 12px;
            background: #07c160;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }
        .form-btn:hover {
            background: #06ad56;
        }
        .form-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .form-btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        .form-btn-secondary:hover {
            background: #eee;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }
        .input-group .form-input {
            flex: 1;
        }
        .input-group .send-btn {
            padding: 11px 14px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
            color: #07c160;
            cursor: pointer;
            white-space: nowrap;
            min-width: 90px;
        }
        .input-group .send-btn:hover {
            background: #e5e5e5;
        }
        .input-group .send-btn:disabled {
            color: #999;
            cursor: not-allowed;
        }

        .invite-link-box {
            background: #f8fff8;
            border: 1px solid #07c160;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }
        .invite-link-box .icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px;
            color: #07c160;
        }
        .invite-link-box .title {
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
        }
        .invite-link-box .desc {
            font-size: 12px;
            color: #999;
            margin-bottom: 12px;
        }
        .invite-link-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
        .invite-link-box button {
            width: 100%;
            padding: 10px;
            background: #07c160;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        .invite-link-box button:hover {
            background: #06ad56;
        }

        .demo-btn {
            width: 100%;
            padding: 10px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            color: #999;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .demo-btn:hover {
            background: #eee;
        }

        .error-msg {
            color: #ff4d4f;
            font-size: 11px;
            margin-top: 6px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }

        .success-msg {
            color: #07c160;
            font-size: 11px;
            margin-top: 6px;
            display: none;
        }
        .success-msg.show {
            display: block;
        }

        .register-link {
            text-align: center;
            margin-top: 14px;
            font-size: 12px;
            color: #999;
        }
        .register-link a {
            color: #07c160;
            cursor: pointer;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="logo.png" alt="Logo" class="logo">
            <h1>空中会议</h1>
            <p>AFT集团线上服务平台</p>
        </div>

        <div class="login-tabs">
            <div class="login-tab active" onclick="switchTab('password')">账号登录</div>
            <div class="login-tab" onclick="switchTab('sms')">短信登录</div>
            <div class="login-tab" onclick="switchTab('invite')">邀请链接</div>
        </div>

        <div class="login-content">
            <!-- 账号密码登录 -->
            <div class="tab-content active" id="passwordTab">
                <form onsubmit="handlePasswordLogin(event)">
                    <div class="form-group">
                        <label>用户名 / 工号</label>
                        <input type="text" class="form-input" id="username" placeholder="请输入用户名或工号" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                    </div>
                    <div class="error-msg" id="passwordError"></div>
                    <button type="submit" class="form-btn" id="passwordBtn">登录</button>
                </form>
                <div class="register-link">
                    还没有账号？<a onclick="showToast('请联系管理员创建账号')">联系管理员</a>
                </div>
            </div>

            <!-- 短信验证码登录 -->
            <div class="tab-content" id="smsTab">
                <form onsubmit="handleSmsLogin(event)">
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" required maxlength="11">
                    </div>
                    <div class="form-group">
                        <label>验证码</label>
                        <div class="input-group">
                            <input type="text" class="form-input" id="smsCode" placeholder="请输入验证码" required maxlength="6">
                            <button type="button" class="send-btn" id="sendBtn" onclick="sendSms()">发送验证码</button>
                        </div>
                    </div>
                    <div class="error-msg" id="smsError"></div>
                    <button type="submit" class="form-btn" id="smsBtn">登录</button>
                </form>
            </div>

            <!-- 邀请链接登录 -->
            <div class="tab-content" id="inviteTab">
                <div class="invite-link-box">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                    <div class="title">使用邀请链接加入</div>
                    <div class="desc">输入您收到的邀请链接或会议号</div>
                    <input type="text" id="inviteLink" placeholder="粘贴邀请链接或输入会议号">
                    <button type="button" onclick="handleInviteLogin()">加入课堂</button>
                </div>
            </div>

            <button class="demo-btn" onclick="enterDemo()">演示模式（无需登录）</button>
        </div>
    </div>

    <script>
        let scanStep = 0;
        let smsCountdown = 0;
        let smsTimer = null;

        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (tab === 'password') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('passwordTab').classList.add('active');
            } else if (tab === 'sms') {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('smsTab').classList.add('active');
            } else if (tab === 'invite') {
                document.querySelectorAll('.login-tab')[2].classList.add('active');
                document.getElementById('inviteTab').classList.add('active');
            }
        }

        // 账号密码登录
        function handlePasswordLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('passwordError');
            const btn = document.getElementById('passwordBtn');

            errorEl.classList.remove('show');
            btn.disabled = true;
            btn.textContent = '登录中...';

            // 演示模式：任意账号密码都能登录
            setTimeout(() => {
                localStorage.setItem('user', JSON.stringify({
                    id: 'user_' + Date.now(),
                    name: username,
                    username: username,
                    avatar: '',
                    loggedIn: true,
                    platform: 'password'
                }));
                window.location.href = 'home.html';
            }, 600);
        }

        // 发送短信验证码
        function sendSms() {
            const phone = document.getElementById('phone').value.trim();
            const sendBtn = document.getElementById('sendBtn');
            const errorEl = document.getElementById('smsError');

            errorEl.classList.remove('show');

            if (!phone || phone.length !== 11) {
                errorEl.textContent = '请输入正确的手机号';
                errorEl.classList.add('show');
                return;
            }

            // 模拟发送验证码
            smsCountdown = 60;
            sendBtn.disabled = true;
            sendBtn.textContent = smsCountdown + '秒后重发';

            showToast('验证码已发送（演示：123456）');

            smsTimer = setInterval(() => {
                smsCountdown--;
                if (smsCountdown <= 0) {
                    clearInterval(smsTimer);
                    sendBtn.disabled = false;
                    sendBtn.textContent = '发送验证码';
                } else {
                    sendBtn.textContent = smsCountdown + '秒后重发';
                }
            }, 1000);
        }

        // 短信登录
        function handleSmsLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const code = document.getElementById('smsCode').value.trim();
            const errorEl = document.getElementById('smsError');
            const btn = document.getElementById('smsBtn');

            errorEl.classList.remove('show');

            if (!code) {
                errorEl.textContent = '请输入验证码';
                errorEl.classList.add('show');
                return;
            }

            // 演示模式：任意验证码都能登录（实际应该是123456）
            btn.disabled = true;
            btn.textContent = '登录中...';

            setTimeout(() => {
                localStorage.setItem('user', JSON.stringify({
                    id: 'user_' + phone,
                    name: '用户' + phone.slice(-4),
                    phone: phone,
                    avatar: '',
                    loggedIn: true,
                    platform: 'sms'
                }));
                window.location.href = 'home.html';
            }, 600);
        }

        // 邀请链接登录
        function handleInviteLogin() {
            const link = document.getElementById('inviteLink').value.trim();

            if (!link) {
                showToast('请输入邀请链接或会议号');
                return;
            }

            // 解析邀请链接或会议号
            let meetingId = link;

            // 如果是完整链接，提取会议号
            try {
                const url = new URL(link);
                meetingId = url.searchParams.get('id') || url.pathname.split('/').pop();
            } catch (e) {
                // 如果不是URL，当作会议号处理
            }

            // 保存会议信息
            localStorage.setItem('pendingMeeting', JSON.stringify({
                id: meetingId,
                fromInvite: true
            }));

            // 模拟登录（邀请链接直接进入，无需账号）
            localStorage.setItem('user', JSON.stringify({
                id: 'guest_' + Date.now(),
                name: '访客用户',
                avatar: '',
                loggedIn: true,
                platform: 'invite'
            }));

            window.location.href = 'meeting.html?id=' + encodeURIComponent(meetingId);
        }

        // 演示模式
        function enterDemo() {
            localStorage.setItem('user', JSON.stringify({
                id: 'demo_' + Date.now(),
                name: '演示用户',
                avatar: '',
                loggedIn: true,
                platform: 'demo',
                demo: true
            }));
            window.location.href = 'home.html';
        }

        // 提示
        function showToast(msg) {
            alert(msg);
        }
    </script>
</body>
</html>
