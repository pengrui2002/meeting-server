<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线会议</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; flex-direction: column; height: 100vh; }

        /* 头部 */
        .header {
            background: #1a1a1a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .meeting-info { display: flex; align-items: center; gap: 20px; }
        .meeting-name { font-size: 16px; font-weight: 500; }
        .meeting-id { font-size: 13px; color: #999; }
        .meeting-id span { color: #07c160; cursor: pointer; }
        .participant-count {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; color: #07c160;
            background: rgba(7,193,96,0.1);
            padding: 4px 12px; border-radius: 12px;
        }
        .recording-badge {
            display: none; align-items: center; gap: 6px;
            font-size: 13px; color: #ff4d4f;
            background: rgba(255,77,79,0.1);
            padding: 4px 12px; border-radius: 12px;
        }
        .recording-badge.show { display: flex; }
        .recording-dot {
            width: 8px; height: 8px; background: #ff4d4f;
            border-radius: 50%; animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .header-actions { display: flex; gap: 10px; }
        .header-btn {
            padding: 8px 14px; background: #333; border: none;
            border-radius: 6px; color: #fff; font-size: 13px; cursor: pointer;
        }
        .header-btn:hover { background: #444; }

        /* 主体 */
        .main { flex: 1; display: flex; overflow: hidden; }

        /* 视频区 */
        .video-area {
            flex: 1; padding: 16px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
            align-content: start;
            overflow-y: auto;
        }
        .video-tile {
            aspect-ratio: 16/9;
            background: #1e1e1e;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .video-tile:hover { border-color: #444; }
        .video-tile.speaking { border-color: #07c160; box-shadow: 0 0 0 2px rgba(7,193,96,0.3); }
        .video-tile.self { border-color: #1890ff; }
        .video-placeholder {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
        }
        .avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: linear-gradient(135deg, #07c160, #06ad56);
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 500;
            margin-bottom: 10px;
        }
        .video-name {
            position: absolute; bottom: 8px; left: 8px;
            background: rgba(0,0,0,0.6);
            padding: 3px 10px; border-radius: 4px;
            font-size: 13px;
            display: flex; align-items: center; gap: 6px;
        }
        .video-badge {
            font-size: 11px; padding: 2px 6px;
            border-radius: 4px; background: rgba(0,0,0,0.5);
        }
        .video-badge.host { background: #07c160; }
        .video-badge.muted { color: #ff4d4f; }
        .video-badge.sharing { color: #1890ff; }
        .video-badge.self-label { color: #1890ff; }

        /* 侧边栏 */
        .sidebar {
            width: 300px; background: #1a1a1a;
            border-left: 1px solid #333;
            display: flex; flex-direction: column;
        }
        .sidebar-tabs { display: flex; border-bottom: 1px solid #333; }
        .sidebar-tab {
            flex: 1; padding: 12px; text-align: center;
            font-size: 14px; color: #999;
            cursor: pointer; border-bottom: 2px solid transparent;
        }
        .sidebar-tab.active { color: #fff; border-bottom-color: #07c160; }
        .sidebar-content { flex: 1; overflow-y: auto; }

        /* 参会人 */
        .participant-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; border-bottom: 1px solid #262626;
        }
        .participant-item:hover { background: #252525; }
        .participant-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, #07c160, #06ad56);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 500;
        }
        .participant-info { flex: 1; }
        .participant-name { font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .participant-role { font-size: 11px; color: #07c160; }
        .participant-status { font-size: 12px; color: #666; }

        /* 聊天 */
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; }
        .chat-message { margin-bottom: 12px; }
        .chat-message.system { text-align: center; font-size: 12px; color: #666; }
        .chat-message .sender { font-size: 12px; color: #07c160; margin-bottom: 4px; }
        .chat-message .content {
            font-size: 14px; color: #ccc;
            background: #252525; padding: 8px 12px;
            border-radius: 8px; display: inline-block;
            max-width: 90%; word-break: break-word;
        }
        .chat-input-area {
            padding: 12px; border-top: 1px solid #333;
            display: flex; gap: 8px;
        }
        .chat-input {
            flex: 1; padding: 10px 14px;
            background: #252525; border: 1px solid #333;
            border-radius: 8px; color: #fff; font-size: 14px; outline: none;
        }
        .chat-input:focus { border-color: #07c160; }
        .chat-send {
            padding: 10px 16px; background: #07c160;
            border: none; border-radius: 8px;
            color: #fff; font-size: 14px; cursor: pointer;
        }

        /* 底部控制栏 */
        .controls {
            background: #1a1a1a;
            padding: 16px 24px;
            display: flex; justify-content: center;
            gap: 20px; border-top: 1px solid #333;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        .control-btn {
            width: 54px; height: 54px; border-radius: 50%;
            border: none; background: #333; color: #fff;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .control-btn:hover { background: #444; }
        .control-btn.active { background: #07c160; }
        .control-btn.muted { background: #ff4d4f; }
        .control-btn.sharing { background: #1890ff; }
        .control-btn.danger:hover { background: #ff4d4f; }
        .control-btn svg { width: 24px; height: 24px; }
        .control-label { font-size: 11px; color: #999; margin-top: 6px; }

        /* 模态框 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: none;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1e1e1e; border-radius: 16px;
            padding: 24px; width: 400px; max-width: 90%;
        }
        .modal-title { font-size: 18px; margin-bottom: 16px; }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; }
        .modal-btn {
            padding: 10px 20px; border-radius: 8px;
            border: none; font-size: 14px; cursor: pointer;
        }
        .modal-btn.cancel { background: #333; color: #fff; }
        .modal-btn.confirm { background: #07c160; color: #fff; }

        /* 主持人管理 */
        .host-controls {
            background: #252525;
            border-bottom: 1px solid #333;
            padding: 10px 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .host-btn {
            padding: 6px 12px;
            background: #333;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .host-btn:hover { background: #444; }
        .host-btn.danger { color: #ff4d4f; }
        .host-btn.danger:hover { background: rgba(255,77,79,0.2); }

        /* 参会人操作 */
        .participant-actions {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }
        .action-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #333;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .action-btn:hover { background: #555; }
        .action-btn.muted { background: #ff4d4f; }
        .action-btn.kicked { background: #ff4d4f; }
        .action-btn svg { width: 14px; height: 14px; }

        /* 更多菜单 */
        .more-menu {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: #333;
            border-radius: 8px;
            padding: 4px 0;
            display: none;
            z-index: 100;
        }
        .more-menu.show { display: block; }
        .more-item {
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .more-item:hover { background: #444; }
        .more-item.danger { color: #ff4d4f; }

        /* 静音提示 */
        .muted-banner {
            background: #ff4d4f;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 13px;
            display: none;
        }
        .muted-banner.show { display: block; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="meeting-info">
                <div>
                    <div class="meeting-name" id="meetingName">在线会议</div>
                    <div class="meeting-id">会议号: <span id="meetingId" onclick="copyId()">---</span></div>
                </div>
                <div class="participant-count">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span id="participantCount">1</span>
                </div>
                <div class="recording-badge" id="recordingBadge">
                    <div class="recording-dot"></div>
                    录制中
                </div>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="copyId()">复制会议号</button>
            </div>
        </header>

        <div class="main">
            <div class="video-area" id="videoGrid"></div>

            <div class="sidebar">
                <div class="muted-banner" id="mutedBanner">主持人已静音，请开启麦克风</div>
                <div class="host-controls" id="hostControls" style="display:none;">
                    <button class="host-btn" onclick="muteAll()">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
                        全体静音
                    </button>
                    <button class="host-btn danger" onclick="closeAll()">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/><line x1="23" y1="1" x2="1" y2="23"/></svg>
                        结束会议
                    </button>
                </div>
                <div class="sidebar-tabs">
                    <div class="sidebar-tab active" onclick="switchTab('participants')">参会人</div>
                    <div class="sidebar-tab" onclick="switchTab('chat')">聊天</div>
                </div>
                <div class="sidebar-content" id="sidebarContent"></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <button class="control-btn" id="micBtn" onclick="toggleMic()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                </button>
                <div class="control-label">麦克风</div>
            </div>

            <div class="control-group">
                <button class="control-btn" id="cameraBtn" onclick="toggleCamera()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 7l-7 5 7 5V7z"/>
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                    </svg>
                </button>
                <div class="control-label">摄像头</div>
            </div>

            <div class="control-group">
                <button class="control-btn" id="shareBtn" onclick="toggleShare()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </button>
                <div class="control-label">共享屏幕</div>
            </div>

            <div class="control-group">
                <button class="control-btn" id="recordBtn" onclick="toggleRecord()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="3" fill="currentColor"/>
                    </svg>
                </button>
                <div class="control-label">录制</div>
            </div>

            <div class="control-group">
                <button class="control-btn" id="handBtn" onclick="toggleHand()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v0"/>
                        <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v6"/>
                        <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/>
                        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
                    </svg>
                </button>
                <div class="control-label">举手</div>
            </div>

            <div class="control-group">
                <button class="control-btn danger" onclick="leaveMeeting()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.63A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"/>
                        <line x1="23" y1="1" x2="1" y2="23"/>
                    </svg>
                </button>
                <div class="control-label">离开</div>
            </div>
        </div>
    </div>

    <!-- 离开确认 -->
    <div class="modal-overlay" id="leaveModal">
        <div class="modal">
            <div class="modal-title">确认离开会议？</div>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeLeaveModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmLeave()">确认离开</button>
            </div>
        </div>
    </div>

    <script>
        // 状态
        const state = {
            meetingId: '',
            meetingName: '',
            userId: '',
            userName: '',
            isHost: false,
            isMuted: false,
            isCameraOff: false,
            isSharing: false,
            isRecording: false,
            isHandRaised: false,
            participants: [],
            messages: [],
            screenStream: null
        };

        // 初始化
        function init() {
            const params = new URLSearchParams(window.location.search);
            state.meetingId = params.get('id') || generateId();
            state.meetingName = params.get('name') || '在线会议';
            state.userName = decodeURIComponent(params.get('host') || '用户');
            state.isHost = params.get('host') === 'true' || params.get('host') === '1';

            document.getElementById('meetingId').textContent = state.meetingId;
            document.getElementById('meetingName').textContent = state.meetingName;
            document.title = state.meetingName;

            // 显示主持人控制栏
            if (state.isHost) {
                document.getElementById('hostControls').style.display = 'flex';
            }

            // 添加自己
            state.participants.push({
                id: 'self',
                name: state.userName,
                isHost: state.isHost,
                isMuted: false,
                isCameraOff: false,
                isSharing: false,
                isHandRaised: false
            });

            renderParticipants();
            renderVideoGrid();
            updateParticipantCount();

            // 模拟其他参会者
            setTimeout(() => addDemoParticipants(), 2000);
        }

        function generateId() {
            const p = () => Math.floor(100 + Math.random() * 900);
            return `${p()}-${p()}-${p()}`;
        }

        // 渲染视频网格
        function renderVideoGrid() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = state.participants.map(p => `
                <div class="video-tile ${p.id === 'self' ? 'self' : ''} ${p.isSpeaking ? 'speaking' : ''}">
                    <div class="video-placeholder">
                        <div class="avatar">${p.name.charAt(0).toUpperCase()}</div>
                    </div>
                    <div class="video-name">
                        ${p.name}
                        ${p.isHost ? '<span class="video-badge host">主持</span>' : ''}
                        ${p.isMuted ? '<span class="video-badge muted">静音</span>' : ''}
                        ${p.isSharing ? '<span class="video-badge sharing">共享</span>' : ''}
                        ${p.id === 'self' ? '<span class="video-badge self-label">我</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        // 渲染参会人
        function renderParticipants() {
            const content = document.getElementById('sidebarContent');
            if (state.participants.length === 0) {
                content.innerHTML = '<div class="empty-state"><p>暂无参会人</p></div>';
                return;
            }

            content.innerHTML = `
                <div class="participants-list">
                    ${state.participants.map(p => `
                        <div class="participant-item">
                            <div class="participant-avatar">${p.name.charAt(0).toUpperCase()}</div>
                            <div class="participant-info">
                                <div class="participant-name">
                                    ${p.name}
                                    ${p.isHost ? '<span class="participant-role">主持人</span>' : ''}
                                    ${p.id === 'self' ? '<span class="participant-role" style="color:#1890ff">我</span>' : ''}
                                </div>
                                <div class="participant-status">
                                    ${p.isMuted ? '已静音' : '可发言'}
                                    ${p.isCameraOff ? ' | 已关摄像头' : ''}
                                    ${p.isHandRaised ? ' | 举手' : ''}
                                    ${p.isSharing ? ' | 共享中' : ''}
                                </div>
                            </div>
                            ${state.isHost && p.id !== 'self' ? `
                                <div class="participant-actions">
                                    <button class="action-btn ${p.isMuted ? 'muted' : ''}" onclick="toggleParticipantMute('${p.id}')" title="${p.isMuted ? '取消静音' : '静音'}">
                                        ${p.isMuted ? '🔇' : '🎤'}
                                    </button>
                                    <button class="action-btn kicked" onclick="kickParticipant('${p.id}')" title="移出">
                                        🚫
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function updateParticipantCount() {
            document.getElementById('participantCount').textContent = state.participants.length;
        }

        // 添加演示参会者
        function addDemoParticipants() {
            const demos = [
                { name: '张总监', isHost: false },
                { name: '李经理', isHost: false },
                { name: '王老师', isHost: false }
            ];

            demos.forEach((d, i) => {
                setTimeout(() => {
                    state.participants.push({
                        id: 'demo_' + i,
                        name: d.name,
                        isHost: false,
                        isMuted: Math.random() > 0.5,
                        isCameraOff: Math.random() > 0.7,
                        isSharing: false,
                        isHandRaised: false
                    });
                    addSystemMessage(`${d.name} 加入了会议`);
                    renderParticipants();
                    renderVideoGrid();
                    updateParticipantCount();
                }, i * 1500);
            });
        }

        // 聊天
        function addSystemMessage(text) {
            state.messages.push({ type: 'system', content: text });
            if (document.querySelector('.sidebar-tab.active').textContent === '聊天') {
                renderChat();
            }
        }

        function addChatMessage(sender, content) {
            state.messages.push({ type: 'user', sender, content });
            renderChat();
        }

        function renderChat() {
            const content = document.getElementById('sidebarContent');
            content.innerHTML = `
                <div class="chat-messages" id="chatMessages">
                    ${state.messages.map(m => {
                        if (m.type === 'system') {
                            return `<div class="chat-message system">${m.content}</div>`;
                        }
                        return `
                            <div class="chat-message">
                                <div class="sender">${m.sender}</div>
                                <div class="content">${m.content}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." onkeypress="handleChatKeypress(event)">
                    <button class="chat-send" onclick="sendChat()">发送</button>
                </div>
            `;
            const messages = document.getElementById('chatMessages');
            if (messages) messages.scrollTop = messages.scrollHeight;
        }

        function handleChatKeypress(e) {
            if (e.key === 'Enter') sendChat();
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            addChatMessage(state.userName, text);
            input.value = '';

            // 模拟回复
            if (state.participants.length > 1) {
                setTimeout(() => {
                    const responder = state.participants[1];
                    addChatMessage(responder.name, '收到！');
                }, 1500);
            }
        }

        // Tab切换
        function switchTab(tab) {
            document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'participants') {
                renderParticipants();
            } else {
                renderChat();
                if (state.messages.length === 0) {
                    addSystemMessage('欢迎来到会议聊天室');
                }
            }
        }

        // 控制按钮
        function toggleMic() {
            state.isMuted = !state.isMuted;
            document.getElementById('micBtn').classList.toggle('muted', state.isMuted);
            const p = state.participants.find(x => x.id === 'self');
            if (p) p.isMuted = state.isMuted;
            renderVideoGrid();
        }

        function toggleCamera() {
            state.isCameraOff = !state.isCameraOff;
            document.getElementById('cameraBtn').classList.toggle('active', state.isCameraOff);
            const p = state.participants.find(x => x.id === 'self');
            if (p) p.isCameraOff = state.isCameraOff;
            renderVideoGrid();
        }

        async function toggleShare() {
            if (state.isSharing) {
                if (state.screenStream) {
                    state.screenStream.getTracks().forEach(track => track.stop());
                    state.screenStream = null;
                }
                state.isSharing = false;
                document.getElementById('shareBtn').classList.remove('sharing');
                const p = state.participants.find(x => x.id === 'self');
                if (p) p.isSharing = false;
                renderVideoGrid();
                addSystemMessage(state.userName + ' 停止共享屏幕');
            } else {
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({
                        video: true,
                        audio: true,
                        systemAudio: 'include'
                    });
                    state.screenStream = stream;
                    state.isSharing = true;
                    document.getElementById('shareBtn').classList.add('sharing');
                    const p = state.participants.find(x => x.id === 'self');
                    if (p) p.isSharing = true;
                    renderVideoGrid();
                    addSystemMessage(state.userName + ' 开始共享屏幕（含系统声音）');
                    stream.getVideoTracks()[0].onended = () => {
                        state.isSharing = false;
                        document.getElementById('shareBtn').classList.remove('sharing');
                        const p = state.participants.find(x => x.id === 'self');
                        if (p) p.isSharing = false;
                        renderVideoGrid();
                        addSystemMessage(state.userName + ' 停止共享屏幕');
                    };
                } catch (err) {
                    console.error('共享失败:', err);
                    addSystemMessage(state.userName + ' 共享屏幕失败');
                }
            }
        }

        function toggleRecord() {
            state.isRecording = !state.isRecording;
            document.getElementById('recordBtn').classList.toggle('active', state.isRecording);
            document.getElementById('recordingBadge').classList.toggle('show', state.isRecording);
            addSystemMessage(state.userName + (state.isRecording ? ' 开始录制会议' : ' 停止录制'));
        }

        function toggleHand() {
            state.isHandRaised = !state.isHandRaised;
            document.getElementById('handBtn').classList.toggle('active', state.isHandRaised);
            const p = state.participants.find(x => x.id === 'self');
            if (p) p.isHandRaised = state.isHandRaised;
            renderParticipants();
            addSystemMessage(state.userName + (state.isHandRaised ? ' 举手发言' : ' 放下手'));
        }

        // 主持人管理功能
        function toggleParticipantMute(participantId) {
            const p = state.participants.find(x => x.id === participantId);
            if (p) {
                p.isMuted = !p.isMuted;
                renderParticipants();
                renderVideoGrid();
                addSystemMessage(`主持人${p.isMuted ? '已静音' : '已取消静音'} ${p.name}`);
            }
        }

        function kickParticipant(participantId) {
            const p = state.participants.find(x => x.id === participantId);
            if (p && confirm(`确定要将 ${p.name} 移出会议吗？`)) {
                state.participants = state.participants.filter(x => x.id !== participantId);
                renderParticipants();
                renderVideoGrid();
                updateParticipantCount();
                addSystemMessage(`${p.name} 已被移出会议`);
            }
        }

        function muteAll() {
            if (!state.isHost) {
                alert('只有主持人才能执行此操作');
                return;
            }
            state.participants.forEach(p => {
                if (p.id !== 'self') {
                    p.isMuted = true;
                }
            });
            renderParticipants();
            renderVideoGrid();
            document.getElementById('mutedBanner').classList.add('show');
            addSystemMessage('主持人已开启全体静音');
        }

        function closeAll() {
            if (!state.isHost) {
                alert('只有主持人才能执行此操作');
                return;
            }
            if (confirm('确定要结束会议吗？所有参会者都将被移出。')) {
                addSystemMessage('会议已被主持人结束');
                setTimeout(() => {
                    window.location.href = 'standalone.html';
                }, 2000);
            }
        }

        // 离开
        function leaveMeeting() {
            document.getElementById('leaveModal').classList.add('show');
        }

        function closeLeaveModal() {
            document.getElementById('leaveModal').classList.remove('show');
        }

        function confirmLeave() {
            window.location.href = 'standalone.html';
        }

        // 复制
        function copyId() {
            navigator.clipboard.writeText(state.meetingId);
            alert('会议号已复制');
        }

        init();
    </script>
</body>
</html>
